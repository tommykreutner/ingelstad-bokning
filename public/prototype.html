<style>
:root{
  --forest:#2d5a3d;--forest-dark:#1e3d2a;--forest-mid:#3d7a54;
  --forest-light:#e8f4ed;--forest-pale:#f4faf6;
  --amber:#d97706;--amber-light:#fef3c7;
  --sky:#0369a1;--sky-light:#e0f2fe;
  --red:#dc2626;--red-light:#fee2e2;
  --ink:#1a2e1e;--ink2:#4a6552;--muted:#7a9485;
  --border:#c8ddd0;--bg:#f7faf8;--card:#fff;
  --radius:10px;--radius-lg:16px;
  --shadow:0 2px 12px rgba(45,90,61,.08);
  --shadow-lg:0 8px 40px rgba(45,90,61,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;font-size:15px;}
h1,h2,h3{font-family:'Playfair Display',serif;}
button,input,select,textarea{font-family:'Nunito',sans-serif;}
.hidden{display:none!important;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:var(--radius);border:none;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .18s;min-height:44px;}
.btn-primary{background:var(--forest);color:#fff;}
.btn-primary:active{background:var(--forest-dark);}
.btn-secondary{background:var(--forest-light);color:var(--forest);}
.btn-ghost{background:transparent;color:var(--forest);border:1.5px solid var(--border);}
.btn-danger{background:var(--red-light);color:var(--red);}
.btn-sm{padding:7px 14px;font-size:.82rem;min-height:36px;}
.btn-full{width:100%;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700;}
.badge-admin{background:#fef3c7;color:#92400e;}
.badge-personal{background:var(--sky-light);color:var(--sky);}
.badge-internat{background:#f3e8ff;color:#6b21a8;}
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.72rem;font-weight:700;}
.tag-fm{background:#dbeafe;color:#1e40af;}
.tag-em{background:#dcfce7;color:#15803d;}
.tag-hel{background:#fef9c3;color:#713f12;}
.tag-na{background:#fce7f3;color:#9d174d;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:.82rem;font-weight:700;color:var(--ink2);margin-bottom:5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:1rem;color:var(--ink);background:#fff;min-height:44px;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--forest);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-hint{font-size:.78rem;color:var(--muted);margin-top:4px;}
.error-box{background:var(--red-light);color:var(--red);border-radius:8px;padding:10px 14px;font-size:.87rem;margin-bottom:14px;}

/* LOGIN */
#screen-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--forest-dark) 0%,var(--forest-mid) 100%);padding:20px;}
.login-card{background:#fff;border-radius:20px;padding:36px 28px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.login-logo-icon{width:40px;height:40px;background:var(--forest);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;flex-shrink:0;}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0;}
.demo-section>p{font-size:.72rem;font-weight:800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
.demo-btn{display:block;width:100%;text-align:left;padding:10px 13px;border-radius:8px;border:1px solid var(--border);background:var(--bg);font-size:.85rem;color:var(--ink);cursor:pointer;margin-bottom:6px;min-height:44px;}
.demo-btn strong{color:var(--forest);}
.demo-btn span{color:var(--muted);font-size:.78rem;}

/* APP */
#screen-app{display:none;flex-direction:column;min-height:100vh;}
.topbar{background:var(--forest-dark);color:#fff;height:54px;display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.topbar-brand{font-family:'Playfair Display',serif;font-size:1rem;flex:1;}
.topbar-brand small{font-family:'Nunito',sans-serif;font-size:.7rem;opacity:.5;margin-left:6px;}
.btn-logout{background:rgba(255,255,255,.15);color:#fff;border:none;padding:7px 12px;border-radius:8px;font-size:.8rem;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:150;box-shadow:0 -2px 12px rgba(0,0,0,.08);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px;border:none;background:none;color:var(--muted);font-size:.62rem;font-weight:700;cursor:pointer;min-height:56px;}
.bnav-btn .bi{font-size:1.3rem;}
.bnav-btn.active{color:var(--forest);}
.main-content{flex:1;overflow-y:auto;padding:20px 16px 80px;}
.page-view{display:none;}
.page-view.active{display:block;}
.page-header{margin-bottom:20px;}
.page-header h1{font-size:1.5rem;margin-bottom:3px;}
.page-header p{color:var(--muted);font-size:.87rem;}

/* BOOKING */
#screen-booking{display:flex;flex-direction:column;min-height:100vh;}
.bk-header{background:var(--forest-dark);color:#fff;padding:16px;display:flex;align-items:center;gap:12px;}
.bk-logo{width:34px;height:34px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.bk-progress{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ps{display:flex;align-items:center;gap:6px;padding:11px 10px;font-size:.72rem;color:var(--muted);white-space:nowrap;border-bottom:2px solid transparent;flex-shrink:0;}
.ps.active{color:var(--forest);border-bottom-color:var(--forest);font-weight:700;}
.ps.done{color:var(--forest-mid);}
.ps .sn{width:19px;height:19px;border-radius:50%;background:var(--border);color:var(--muted);font-size:.68rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ps.active .sn{background:var(--forest);color:#fff;}
.ps.done .sn{background:var(--forest-light);color:var(--forest);}
.bk-body{flex:1;overflow-y:auto;padding:20px 16px 40px;}
.step-card{background:#fff;border-radius:var(--radius-lg);padding:24px 20px;box-shadow:var(--shadow);margin-bottom:16px;}
.step-card h2{font-size:1.2rem;margin-bottom:6px;}
.step-desc{color:var(--muted);font-size:.87rem;margin-bottom:20px;line-height:1.5;}
.choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.choice-btn{border:2px solid var(--border);border-radius:var(--radius);padding:14px 12px;background:#fff;cursor:pointer;text-align:left;transition:border-color .15s,background .15s;min-height:80px;}
.choice-btn.selected{border-color:var(--forest);background:var(--forest-light);}
.choice-btn strong{display:block;font-size:.9rem;margin-bottom:3px;}
.choice-btn span{font-size:.76rem;color:var(--muted);}
.ci{font-size:1.4rem;margin-bottom:6px;display:block;}
.prog-card{border:2px solid var(--border);border-radius:var(--radius);padding:14px;background:#fff;cursor:pointer;transition:border-color .15s,background .15s;display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.prog-card.selected{border-color:var(--forest);background:var(--forest-light);}
.prog-card.nv-card{border-color:#f9a8d4;}
.prog-card.nv-card.selected{background:#fce7f3;border-color:#ec4899;}
.prog-card .pi{font-size:1.5rem;flex-shrink:0;}
.prog-card h3{font-size:.93rem;margin-bottom:2px;}
.prog-card p{font-size:.78rem;color:var(--muted);}
.na-note{background:#fce7f3;border-radius:9px;padding:12px;font-size:.82rem;color:#9d174d;margin-bottom:14px;line-height:1.5;}
.info-box{background:var(--forest-light);border-radius:9px;padding:12px 14px;font-size:.84rem;color:var(--forest-dark);margin-bottom:14px;line-height:1.5;}
.info-box.amber{background:var(--amber-light);color:#7c3d0d;}
.slot-card{border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;background:#fff;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:10px;}
.slot-card.selected{border-color:var(--forest);background:var(--forest-light);}
.slot-card.full{opacity:.5;cursor:not-allowed;}
.sl-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.sl-date{font-weight:700;font-size:.93rem;}
.sl-spots{font-size:.75rem;color:var(--muted);}
.sl-tags{display:flex;gap:5px;flex-wrap:wrap;}
.sl-combo{font-size:.78rem;color:var(--forest-mid);margin-top:5px;font-style:italic;}
.sum-line{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);font-size:.88rem;gap:12px;}
.sum-line:last-child{border-bottom:none;}
.sum-line .sl{color:var(--muted);flex-shrink:0;}
.sum-line .sv{font-weight:600;text-align:right;}
.success-wrap{text-align:center;padding:32px 8px;}
.success-wrap .sicon{font-size:3.5rem;margin-bottom:12px;}
.success-wrap h2{font-size:1.6rem;color:var(--forest);margin-bottom:8px;}
.success-wrap p{color:var(--muted);line-height:1.6;margin-bottom:16px;font-size:.9rem;}
.bk-ref{background:var(--forest-light);border-radius:10px;padding:16px 20px;display:inline-block;margin-bottom:20px;}
.bk-ref p{font-size:.75rem;color:var(--muted);margin-bottom:3px;}
.bk-ref strong{font-size:1.5rem;color:var(--forest);letter-spacing:.1em;}

/* DASHBOARD */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.stat-card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);}
.stat-label{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.stat-val{font-size:1.8rem;font-family:'Playfair Display',serif;color:var(--ink);line-height:1;}
.stat-sub{font-size:.75rem;color:var(--muted);margin-top:3px;}
.sec-title{font-size:1rem;font-family:'Playfair Display',serif;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}

/* TABLE */
.table-wrap{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:480px;}
th{background:var(--forest-pale);color:var(--ink2);font-size:.72rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:10px 14px;font-size:.85rem;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
.td-m{color:var(--muted);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;animation:fadeIn .2s;}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 36px;width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .25s ease;}
.modal h3{font-size:1.15rem;margin-bottom:5px;}
.modal-sub{color:var(--muted);font-size:.85rem;margin-bottom:20px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.modal-footer{display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.modal-footer .btn{flex:1;}

/* TOGGLE */
.toggle{position:relative;width:44px;height:26px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.tslider{position:absolute;inset:0;background:var(--border);border-radius:13px;cursor:pointer;transition:.2s;}
.tslider:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle input:checked+.tslider{background:var(--forest);}
.toggle input:checked+.tslider:before{transform:translateX(18px);}

/* MISC */
.card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.mt-8{margin-top:8px;}
.mt-12{margin-top:12px;}
.mb-8{margin-bottom:8px;}
.text-muted{color:var(--muted);}
.text-sm{font-size:.82rem;}
.fw-6{font-weight:600;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;background:var(--forest-light);color:var(--forest);font-size:.75rem;font-weight:700;margin:2px;}
.slot-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border);}
.slot-row:last-child{border-bottom:none;}
.nv-item{border:1.5px solid var(--border);border-radius:9px;padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .15s;}
.nv-item.active{border-color:var(--forest);background:var(--forest-light);}

@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>

// AUTH
function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  errEl.classList.add('hidden');
  fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})})
    .then(r=>r.json())
    .then(data=>{
      if(data.error){errEl.textContent=data.error;errEl.classList.remove('hidden');return;}
      const usr=DB.users.find(x=>x.id==='admin')||DB.users[0];
      const u2=Object.assign({},usr,{id:data.user.id,name:data.user.name,role:data.user.role,program:data.user.program_id,email:data.user.email});
      loginAs(u2);
    })
    .catch(()=>{errEl.textContent='Inloggningsfel, försök igen';errEl.classList.remove('hidden');});
}
function quickLogin(id){loginAs(DB.users.find(x=>x.id===id));}
function loginAs(user){
  currentUser=user;
  document.getElementById('screen-login').style.display='none';
  document.getElementById('screen-app').style.display='flex';
  document.getElementById('topbar-user').textContent=user.name;
  document.getElementById('topbar-role').textContent={admin:'Admin',personal:'Personal',internat:'Internat'}[user.role]||'';
  renderNav();
  // Refresh data from DB before showing dashboard
  Promise.all([
    fetch('/api/slots').then(r=>r.json()),
    fetch('/api/bookings').then(r=>r.json()),
    fetch('/api/staff').then(r=>r.json()),
  ]).then(([slotsRes,bookingsRes,staffRes])=>{
    if(Array.isArray(slotsRes)) DB.slots=slotsRes.map(s=>({id:s.id,programId:s.program_id,date:s.date,type:s.type,capacity:s.capacity,booked:s.booked}));
    if(Array.isArray(bookingsRes)) DB.bookings=bookingsRes.map(b=>({id:b.id,studentName:b.student_name,studentEmail:b.student_email,guardianEmail:b.guardian_email,phone:b.phone,school:b.school,municipality:b.municipality,grade:b.grade,days:b.days,overnight:b.overnight,slots:(b.booking_slots||[]).map(bs=>bs.slot_id),specialFood:b.special_food||'',otherInfo:b.other_info||'',code:b.code,createdAt:b.created_at}));
    if(Array.isArray(staffRes)) DB.users=staffRes.map(u=>({id:u.id,name:u.name,role:u.role,program:u.program_id,email:u.email,pass:''}));
    showPage('dashboard');
  }).catch(()=>showPage('dashboard'));
}

// === TERM HELPERS ===
function getTermId(date){
  var d=new Date(date),y=d.getFullYear(),m=d.getMonth()+1,yy=String(y).slice(2);
  return m>=8?'HT'+yy:'VT'+yy;
}
function termLabel(id){
  return (id.slice(0,2)==='HT'?'Hoesttermin':'Vaartermin')+' 20'+id.slice(2);
}
function termDateRange(id){
  var type=id.slice(0,2),year=2000+parseInt(id.slice(2));
  return type==='HT'?{start:year+'-08-01',end:year+'-12-31'}:{start:year+'-01-01',end:year+'-06-30'};
}
function currentAndNextTerms(){
  var today=new Date(),y=today.getFullYear(),m=today.getMonth()+1;
  var yy=String(y).slice(2),nyy=String(y+1).slice(2),pyy=String(y-1).slice(2);
  return m>=8?['HT'+yy,'VT'+nyy]:['HT'+pyy,'VT'+yy];
}
function autoCloseOldTerms(){
  var today=new Date().toISOString().slice(0,10);
  var toClose=DB.settings.openTerms.filter(function(tid){return today>termDateRange(tid).end;});
  toClose.forEach(function(tid){
    DB.settings.openTerms=DB.settings.openTerms.filter(function(x){return x!==tid;});
    if(!DB.settings.termHistory.includes(tid)) DB.settings.termHistory.push(tid);
  });
}
function isDateBookable(dateStr){
  if(!DB.settings.openTerms.includes(getTermId(dateStr))) return false;
  var todayStr=new Date().toISOString().slice(0,10);
  var todayDate=new Date(todayStr), slotDate=new Date(dateStr);
  if((slotDate-todayDate)/(1000*60*60*24)<7) return false;
  if(DB.settings.blockedDates.includes(dateStr)) return false;
  var day=new Date(dateStr).getDay();
  if(day===0||day===6) return false;
  return true;
}
function isDateInOpenTerm(dateStr){
  return DB.settings.openTerms.includes(getTermId(dateStr));
}
function renderTermRows(){
  autoCloseOldTerms();
  var available=currentAndNextTerms();
  var history=DB.settings.termHistory.slice().reverse();
  var html='<div>';
  available.forEach(function(tid){
    var open=DB.settings.openTerms.includes(tid);
    var r=termDateRange(tid);
    html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">'
      +'<div><strong class="text-sm">'+termLabel(tid).replace('Hoest','H\xf6st').replace('Vaar','V\xe5r')+'</strong>'
      +'<div class="text-sm text-muted">'+fmtDate(r.start)+' \u2013 '+fmtDate(r.end)+'</div></div>'
      +'<div style="display:flex;align-items:center;gap:8px;">'
      +'<span style="font-size:.75rem;font-weight:700;color:'+(open?'var(--forest)':'var(--muted)')+';">'+(open?'\u2705 \xd6ppen':'🔒 St\xe4ngd')+'</span>'
      +'<label class="toggle"><input type="checkbox" '+(open?'checked':'')
      +' onchange="toggleTerm(\''+tid+'\',this.checked)"><span class="tslider"></span></label>'
      +'</div></div>';
  });
  html+='</div>';
  if(history.length>0) html+='<p class="text-sm text-muted" style="margin-top:8px;"><strong>Arkiv:</strong> '+history.map(function(tid){return termLabel(tid).replace('Hoest','H\xf6st').replace('Vaar','V\xe5r');}).join(', ')+'</p>';
  return html;
}
function toggleTerm(tid,open){
  if(open){
    if(!DB.settings.openTerms.includes(tid)) DB.settings.openTerms.push(tid);
    DB.settings.termHistory=DB.settings.termHistory.filter(function(x){return x!==tid;});
  } else {
    DB.settings.openTerms=DB.settings.openTerms.filter(function(x){return x!==tid;});
    if(!DB.settings.termHistory.includes(tid)) DB.settings.termHistory.push(tid);
  }
  renderAdmin();
  toast(termLabel(tid).replace('Hoest','H\xf6st').replace('Vaar','V\xe5r')+': '+(open?'\xd6ppnad f\xf6r bokning':'St\xe4ngd f\xf6r bokning'));
}


// === STATISTICS ===
function getSchoolYear(dateStr){
  var d=new Date(dateStr),y=d.getFullYear(),m=d.getMonth()+1;
  return m>=8?(y+'/'+(String(y+1).slice(2))):(y-1+'/'+(String(y).slice(2)));
}
function getCurrentSchoolYear(){return getSchoolYear(new Date().toISOString().slice(0,10));}
function getPrevSchoolYear(){
  var d=new Date(),y=d.getFullYear(),m=d.getMonth()+1;
  return m>=8?((y-1)+'/'+(String(y).slice(2))):((y-2)+'/'+(String(y-1).slice(2)));
}
function buildStatsList(){
  var currentSY=getCurrentSchoolYear(),prevSY=getPrevSchoolYear(),rows=[];
  DB.bookings.forEach(function(b){
    var sy=getSchoolYear(b.createdAt),include=false,note='';
    if(sy===currentSY&&(b.grade==='9'||b.grade==='Har gått ut grundskolan')){include=true;note=b.grade==='9'?'Åk 9':'Ut grundskolan';}
    if(sy===prevSY&&b.grade==='8'){include=true;note='Åk 8 (föreg. låsår)';}
    if(!include)return;
    var progs=[...new Set(b.slots.map(function(sid){
      var sl=DB.slots.find(function(s){return s.id===sid;});
      return sl?DB.programs.find(function(p){return p.id===sl.programId;})?.name:'';
    }).filter(Boolean))].join(', ');
    rows.push({name:b.studentName,school:b.school,municipality:b.municipality||'',grade:b.grade,programs:progs,note:note,schoolYear:sy});
  });
  return rows.sort(function(a,b){return a.municipality.localeCompare(b.municipality)||a.school.localeCompare(b.school);});
}
function renderStatsPage(){
  var rows=buildStatsList();
  var cSY=getCurrentSchoolYear(),pSY=getPrevSchoolYear();
  var html='<div class="page-header"><h1>Statistik</h1><p>Innevarande låsår ('+cSY+'): åk 9 & gymnasie &mdash; Föregående ('+pSY+'): åk 8</p></div>'
    +'<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">'
    +'<button class="btn btn-secondary btn-sm" onclick="exportStatsCSV()">Exportera CSV</button>'
    +'<button class="btn btn-secondary btn-sm" onclick="exportStatsPDF()">Exportera PDF</button>'
    +'<button class="btn btn-primary btn-sm" onclick="emailStats()">Skicka till admin-mail</button>'
    +'</div>';
  if(!rows.length){html+='<div class="card text-muted text-sm">Inga relevanta bokningar hittades för dessa låsår.</div>';}
  else{
    html+='<div class="table-wrap"><table><thead><tr><th>Namn</th><th>Skola</th><th>Kommun</th><th>Klass</th><th>Provat på</th><th>Not</th></tr></thead><tbody>'
      +rows.map(function(r){
        return '<tr><td><strong>'+r.name+'</strong></td><td>'+r.school+'</td><td>'+r.municipality+'</td>'
          +'<td>Åk '+r.grade+'</td><td class="text-sm td-m">'+r.programs+'</td>'
          +'<td><span class="badge badge-personal" style="font-size:.66rem;">'+r.note+'</span></td></tr>';
      }).join('')+'</tbody></table></div>'
      +'<p class="text-sm text-muted" style="margin-top:8px;">'+rows.length+' elever totalt</p>';
  }
  document.getElementById('page-stats').innerHTML=html;
}
function exportStatsCSV(){
  var rows=buildStatsList();
  var lines=['﻿Namn,Skola,Hemkommun,Klass,Provat på,Not,Låsår'];
  rows.forEach(function(r){
    lines.push([r.name,r.school,r.municipality,r.grade,r.programs,r.note,r.schoolYear]
      .map(function(v){return '"'+String(v||'').replace(/"/g,'""')+'"';}).join(','));
  });
  var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='statistik_provapaa.csv';a.click();
}

          +'<div class="stat-card"><div class="stat-label">Program</div><div class="stat-val">'+DB.programs.filter(p=>!p.hidden).length+'</div><div class="stat-sub">aktiva</div></div>'
          +'<div class="stat-card"><div class="stat-label">Termin</div><div class="stat-val" style="font-size:1.2rem;">'+currentTerm+'</div><div class="stat-sub">aktuell</div></div>'
          +'<div class="stat-card" style="grid-column:1/-1;border-left:4px solid '+(bookingOpen?'var(--forest)':'#dc2626')+';"><div class="stat-label">Bokning</div><div class="stat-val" style="font-size:1.2rem;color:'+(bookingOpen?'var(--forest)':'#dc2626')+';">'+(bookingOpen?'✅ Öppen':'🔴 Stängd')+'</div><div class="stat-sub">'+(bookingOpen?'Elever kan boka tider':'Inga nya bokningar tas emot')+'</div></div>';

      const today=new Date().toISOString().slice(0,10);

          +'</tbody></table></div>';

      if(currentUser.role==='internat'){
        const upcoming=DB.bookings.filter(b=>b.overnight&&getOvernightNightsForBooking(b).some(n=>n>=today&&n<=termEnd));

          }).join('')

      }

      return '<p class="text-sm text-muted">Se <strong>Bokningar</strong>-fliken för detaljer.</p>';

  `;

// BOOKINGS
function renderBookings(activeDate){
  var mp=currentUser.program;
  var prog=mp?DB.programs.find(function(p){return p.id===mp;}):null;
  var list=mp?DB.bookings.filter(function(b){return b.slots.some(function(sid){return DB.slots.find(function(s){return s.id===sid&&s.programId===mp;});});}):DB.bookings;
  var mySlots=mp?DB.slots.filter(function(s){return s.programId===mp;}).sort(function(a,b){return a.date.localeCompare(b.date)||a.type.localeCompare(b.type);}):[];
  var selectedDate=activeDate||null;
  var dateBookings=selectedDate?list.filter(function(b){return b.slots.some(function(sid){var s=DB.slots.find(function(x){return x.id===sid;});return s&&s.programId===mp&&s.date===selectedDate;});}):[];

  var html='<div class="page-header"><h1>Bokningar</h1><p>'+(mp?prog?.name:'Alla program')+'</p></div>';

  if(mp){
    // Personal: day overview first
    html+='<div class="sec-title" style="margin-bottom:10px;">Mina dagar <span class="text-sm text-muted fw-6" style="font-weight:400;">klicka p\u00e5 en dag f\u00f6r att se elever</span></div>';
    if(!mySlots.length){
      html+='<div class="card text-muted text-sm" style="margin-bottom:16px;">Inga tider inlagda \u00e4nnu \u2014 g\u00e5 till Tider-fliken f\u00f6r att l\u00e4gga till.</div>';
    } else {
      var byDate={};
      mySlots.forEach(function(sl){if(!byDate[sl.date])byDate[sl.date]=[];byDate[sl.date].push(sl);});
      html+='<div style="margin-bottom:16px;">';
      Object.entries(byDate).sort(function(a,b){return a[0].localeCompare(b[0]);}).forEach(function(entry){
        var date=entry[0], slots=entry[1];
        var bkgsOnDay=list.filter(function(b){return b.slots.some(function(sid){var s=DB.slots.find(function(x){return x.id===sid;});return s&&s.programId===mp&&s.date===date;});});
        // Skip days with no bookings
        if(!bkgsOnDay.length) return;
        var isSelected=date===selectedDate;
        var totalBooked=slots.reduce(function(a,s){return a+s.booked;},0);
        var totalCap=slots.reduce(function(a,s){return a+s.capacity;},0);
        var full=totalBooked>=totalCap;
        html+='<div onclick="renderBookings(\''+date+'\')" style="border:1.5px solid '+(isSelected?'var(--forest)':full?'#fca5a5':'var(--border)')+';border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;background:'+(isSelected?'var(--forest-light)':full?'#fff7f7':'#fff')+';transition:border-color .15s;">'
          +'<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">'
          +'<div><strong style="font-size:.93rem;">'+fmtDate(date)+'</strong>'
          +' '+slots.map(function(s){return '<span class="tag tag-'+s.type+'" style="margin-right:2px;">'+s.type.toUpperCase()+'</span>';}).join('')+'</div>'
          +'<div style="text-align:right;flex-shrink:0;">'
          +'<div style="font-size:.85rem;font-weight:700;color:'+(full?'var(--red)':isSelected?'var(--forest)':'var(--ink2)')+';">'+totalBooked+'/'+totalCap+' bokade</div>'
  
          +'</div></div>'
          +(bkgsOnDay.length>0?'<div class="text-sm text-muted" style="margin-top:5px;">'+bkgsOnDay.map(function(b){return b.studentName;}).join(', ')+'</div>':'<div class="text-sm text-muted" style="margin-top:5px;">Inga elever bokade \xe4nnu</div>')
          +'</div>';
      });
      html+='</div>';
    }

    if(selectedDate){
      html+='<div class="sec-title" style="margin-bottom:10px;">'+fmtDate(selectedDate)
        +' \u2014 '+dateBookings.length+' elev(er)'
        +'<button class="btn btn-ghost btn-sm" onclick="exportDayCSV(\''+selectedDate+'\')">Exportera</button></div>';
      if(!dateBookings.length){
        html+='<div class="card text-muted text-sm">Inga bokningar p\u00e5 detta datum.</div>';
      }
      dateBookings.forEach(function(b){
        html+='<div class="card" style="margin-bottom:10px;">'
          +'<strong>'+b.studentName+'</strong>'
          +'<div class="text-sm text-muted" style="line-height:1.85;margin-top:6px;">'
          +'\ud83d\udce7 '+b.studentEmail+'<br>\ud83d\udcf1 '+b.phone
          +'<br>\ud83c\udfe7 '+b.school+(b.municipality?' ('+b.municipality+')':'')+', \u00e5k '+b.grade
          +(b.overnight?'<br>\ud83d\udecf\ufe0f \u00d6vernattning bokad':'')
          +(b.specialFood?'<br>\ud83c\udf7d\ufe0f '+b.specialFood:'')
          +(b.otherInfo?'<br>\u2139\ufe0f '+b.otherInfo:'')
          +'</div></div>';
      });
    }
  } else {
    // Admin: full list with export
    html+='<div class="mb-8"><button class="btn btn-secondary btn-sm" onclick="exportAllCSV()">Exportera CSV</button></div>';
    if(!list.length) html+='<div class="card text-muted text-sm">Inga bokningar \u00e4nnu.</div>';
    list.forEach(function(b){
      html+='<div class="card" style="margin-bottom:12px;">'
        +'<div class="flex-between mb-8"><div><strong>'+b.studentName+'</strong> <span class="badge badge-personal" style="font-size:.68rem;">'+b.id+'</span></div>'
        +'<button class="btn btn-danger btn-sm" onclick="cancelBooking(\''+b.id+'\')">Avboka</button></div>'
        +'<div class="text-sm text-muted" style="line-height:1.85;">'
        +'\ud83d\udce7 '+b.studentEmail+' / '+b.guardianEmail+'<br>\ud83d\udcf1 '+b.phone
        +'<br>\ud83c\udfe7 '+b.school+(b.municipality?' ('+b.municipality+')':'')+', \u00e5k '+b.grade
        +(b.overnight?'<br>\ud83d\udecf\ufe0f \u00d6vernattning':'')
        +(b.specialFood?'<br>\ud83c\udf7d\ufe0f '+b.specialFood:'')
        +(b.otherInfo?'<br>\u2139\ufe0f '+b.otherInfo:'')
        +'</div>'
        +'<div style="margin-top:8px;display:flex;gap:5px;flex-wrap:wrap;">'
        +b.slots.map(function(sid){var s=DB.slots.find(function(x){return x.id===sid;});var pr=s?DB.programs.find(function(p){return p.id===s.programId;}):null;return s?'<span class="chip">'+(pr?pr.icon+' '+pr.name:'')+' <span class="tag tag-'+s.type+'">'+s.type.toUpperCase()+'</span> <span style="font-size:.7rem;font-weight:400;">'+fmtDateLong(s.date)+'</span></span>':''}).join('')
        +'</div></div>';
    });
  }
  document.getElementById('page-bookings').innerHTML=html;
}
function exportDayCSV(date){
  var mp=currentUser.program;
  var list=DB.bookings.filter(function(b){return b.slots.some(function(sid){var s=DB.slots.find(function(x){return x.id===sid;});return s&&s.programId===mp&&s.date===date;});});
  var lines=['\ufeffNamn,Skola,Kommun,Klass,Telefon,E-post,\u00d6vernattning,Specialkost,\u00d6vrigt'];
  list.forEach(function(b){lines.push([b.studentName,b.school,b.municipality||'',b.grade,b.phone,b.studentEmail,b.overnight?'Ja':'Nej',b.specialFood||'',b.otherInfo||''].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(','));});
  var blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bokningar_'+date+'.csv';a.click();
}

  var isWeekday=document.getElementById('ia-weekday-wrap').style.display!=='none';
  var isPeriod=!isWeekday&&document.getElementById('ia-period-wrap').style.display!=='none';

    if(!from||!to){toast('Ange både från och till','e');return;}

    var wdayNames=['söndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];
    while(cur<=end){
      if(cur.getDay()===wday){
        var d=cur.toISOString().slice(0,10);
        if(!DB.closedRooms.some(function(cr){return cr.room===roomVal&&cr.date===d;})){
          DB.closedRooms.push({room:roomVal,date:d});added++;
        }
      }
      cur.setDate(cur.getDate()+1);

    var from=document.getElementById('ia-from').value;
    var to=document.getElementById('ia-to').value;
    if(!from||!to){toast('Ange både från och till','e');return;}
    var cur=new Date(from),end=new Date(to),added=0;
    while(cur<=end){
      var d=cur.toISOString().slice(0,10);
      if(!DB.closedRooms.some(function(cr){return cr.room===roomVal&&cr.date===d;})){
        DB.closedRooms.push({room:roomVal,date:d});added++;
      }
      cur.setDate(cur.getDate()+1);
    }
    toast(added+' nätter stängda');
  } else {
    var d=document.getElementById('ia-date').value;
    if(!d){toast('Välj ett datum','e');return;}
    if(!DB.closedRooms.some(function(cr){return cr.room===roomVal&&cr.date===d;})){

}

function saveSlot(pid){
  const cap=parseInt((document.getElementById('sl-cap')||{value:'8'}).value)||8;
  const wdayNames=['öndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];
  const isWeekday=document.getElementById('slot-weekday-wrap')&&document.getElementById('slot-weekday-wrap').style.display!=='none';
  const isPeriod=!isWeekday&&document.getElementById('slot-period-wrap')&&document.getElementById('slot-period-wrap').style.display!=='none';
  const slots=[];
  if(isWeekday){
    const wday=parseInt(document.getElementById('sl-wday').value);
    const from=document.getElementById('sl-wfrom').value;
    const to=document.getElementById('sl-wto').value;
    const type=document.getElementById('sl-wtype').value;
    if(!from||!to){toast('Ange både från och till','e');return;}
    let cur=new Date(from),end=new Date(to);
    while(cur<=end){
      if(cur.getDay()===wday){
        const d=cur.toISOString().slice(0,10);
        if(!DB.settings.blockedDates.includes(d)&&isDateInOpenTerm(d)) slots.push({programId:pid,date:d,type,capacity:cap});
      }
      cur.setDate(cur.getDate()+1);
    }
  } else if(isPeriod){
    const from=document.getElementById('sl-pfrom').value;
    const to=document.getElementById('sl-pto').value;
    const type=document.getElementById('sl-ptype').value;
    if(!from||!to){toast('Ange både från och till','e');return;}
    let cur=new Date(from),end=new Date(to);
    while(cur<=end){
      const d=cur.toISOString().slice(0,10);
      if(!DB.settings.blockedDates.includes(d)&&isDateInOpenTerm(d)) slots.push({programId:pid,date:d,type,capacity:cap});
      cur.setDate(cur.getDate()+1);
    }
  } else {
    const date=document.getElementById('sl-date').value;
    const type=document.getElementById('sl-type').value;
    if(!date){toast('Välj ett datum','e');return;}
    if(DB.settings.blockedDates.includes(date)){toast('Datumet är blockerat','e');return;}
    if(!isDateInOpenTerm(date)){toast('Terminen är inte öppen för bokning','e');return;}
    slots.push({programId:pid,date,type,capacity:cap});
  }
  if(!slots.length){toast('Inga giltiga datum','e');return;}
  fetch('/api/slots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slots})})
    .then(r=>r.json())
    .then(data=>{
      if(data.error){toast(data.error,'e');return;}
      (data.slots||[data]).forEach(s=>DB.slots.push({id:s.id,programId:s.program_id,date:s.date,type:s.type,capacity:s.capacity,booked:s.booked}));
      closeModal();renderSlots();toast(slots.length+' tid(er) sparade!');
    })
    .catch(()=>toast('Fel vid sparande','e'));
}

// === ROOM ALLOCATION ===


function overnightStayLabel(slots) {
  // slots can be: array of combo objects {date, date2} OR array of {date} objects
  // Extract all prova-pa dates
  var slotDates=[];
  if(slots&&slots.length){
    slots.forEach(function(s){
      if(!s) return;
      if(s.date) slotDates.push(s.date);
      if(s.date2) slotDates.push(s.date2);
    });
  }
  slotDates=[...new Set(slotDates)].filter(Boolean).sort();
  if(!slotDates.length) return '';
  var day1=slotDates[0];
  var day2=slotDates.length>1?slotDates[slotDates.length-1]:null;
  var arrivalNight=prevDay(day1);
  if(day2&&day2!==day1){
    return 'Ankomst '+fmtDate(arrivalNight)+' kväll, avresa '+fmtDate(day2)+' kl 15:50 (2 nätter)';
  }
  return 'Ankomst '+fmtDate(arrivalNight)+' kväll, avresa '+fmtDate(day1)+' kl 15:50';
}
function nightLabel(date) {
  // "Ankomst [dag före], avresa [date]"
  var prev = prevDay(date);
  return 'Ankomst ' + fmtDate(prev) + ', avresa ' + fmtDate(date);
}
function isRoomClosed(room, date) {
  return DB.closedRooms.some(function(cr){
    return cr.date===date && (cr.room==='all' || cr.room===room);
  });
}
function availableRoomsOnNight(date) {
  var cap = DB.settings.overnightCapacity;
  var booked = DB.roomBookings.filter(function(rb){return rb.date===date;}).map(function(rb){return rb.room;});
  var rooms = [];
  for(var r=1;r<=cap;r++){
    if(!booked.includes(r) && !isRoomClosed(r,date)) rooms.push(r);
  }
  return rooms;
}
function assignRoom(date) {
  var cap = DB.settings.overnightCapacity;
  var prevDate = prevDay(date);
  var usedTonight = DB.roomBookings.filter(function(rb){return rb.date===date;}).map(function(rb){return rb.room;});
  var usedLastNight = DB.roomBookings.filter(function(rb){return rb.date===prevDate;}).map(function(rb){return rb.room;});
  // Prefer room free tonight AND free last night AND not closed
  for(var r=1;r<=cap;r++){
    if(!usedTonight.includes(r) && !usedLastNight.includes(r) && !isRoomClosed(r,date)) return r;
  }
  // Fall back: any free and open room
  for(var r=1;r<=cap;r++){
    if(!usedTonight.includes(r) && !isRoomClosed(r,date)) return r;
  }
  return null;
}

function getOvernightNightsForBooking(booking) {
  // Returns array of night dates (the date the guest sleeps, i.e. check-in date)
  // 1-day booking: [prevDay(day1)]
  // 2-day booking: [prevDay(day1), day1]  (day1 = night between day1 and day2)
  if(!booking.overnight) return [];
  var slotDates=[...new Set(booking.slots.map(function(sid){
    var s=DB.slots.find(function(x){return x.id===sid;});
    return s?s.date:null;
  }).filter(Boolean))].sort();
  var day1=slotDates[0];
  if(slotDates.length===1){
    return [prevDay(day1)];
  }
  // 2 consecutive days — 2 nights
  return [prevDay(day1), day1];
}

function renderOvernight(){
  var today = new Date().toISOString().slice(0,10);
  var termEnd = DB.settings.openTerms.length ? termDateRange(DB.settings.openTerms[0]).end : '9999-12-31';
  var cap = DB.settings.overnightCapacity;

  // Build list of all booked nights from today to term end
  var bookedNights = DB.roomBookings
    .filter(function(rb){return rb.date >= today && rb.date <= termEnd;})
    .map(function(rb){return rb.date;});
  var allNights = [...new Set(bookedNights)].sort();

  // Build matrix: nights x rooms
  function buildMatrix() {
    var rows = '';
    allNights.forEach(function(night){
      rows += '<tr><td style="font-size:.78rem;font-weight:700;padding:8px 10px;"><div>'+fmtDate(night)+'</div><div style="font-weight:400;color:var(--muted);font-size:.7rem;">ankomst '+fmtDate(prevDay(night))+'</div></td>';
      for(var r=1;r<=cap;r++){
        var rb = DB.roomBookings.find(function(x){return x.date===night&&x.room===r;});
        var bkg = rb ? DB.bookings.find(function(b){return b.id===rb.bookingId;}) : null;
        var prevNightRb = DB.roomBookings.find(function(x){return x.date===prevDay(night)&&x.room===r;});
        var hasCleaningIssue = prevNightRb && rb;
        rows += '<td style="padding:6px 8px;">';
        if(bkg){
          rows += '<div style="background:'+(hasCleaningIssue?'#fef3c7':'var(--forest-light)')+';border:1px solid '+(hasCleaningIssue?'#d97706':'var(--forest)')+';border-radius:7px;padding:5px 8px;font-size:.76rem;">'
            +'<strong>'+bkg.studentName.split(' ')[0]+'</strong>'
            +(hasCleaningIssue?'<span title="Direkt ombyte" style="margin-left:4px;color:#d97706;">⚠️</span>':'')
            +'</div>';
        } else {
          rows += '<div style="background:#f3f4f6;border-radius:7px;padding:5px 8px;font-size:.75rem;color:#9ca3af;text-align:center;">\u2014</div>';
        }
        rows += '</td>';
      }
      rows += '</tr>';
    });
    return rows;
  }

  // Next upcoming overnight
  var nextNight = allNights.find(function(n){return n>=today;});
  var nextNightBookings = nextNight ? DB.roomBookings.filter(function(rb){return rb.date===nextNight;}).map(function(rb){
    var b=DB.bookings.find(function(x){return x.id===rb.bookingId;});
    return b?'Rum '+rb.room+': '+b.studentName:'';
  }).filter(Boolean) : [];

  var html = '<div class="page-header"><h1>\uD83D\uDECF\uFE0F Internat</h1><p>'+cap+' rum \u2014 '+today+' till terminens slut</p></div>';

  // Next night card
  if(nextNight){
    html += '<div class="card" style="margin-bottom:16px;border-left:4px solid var(--forest);">'
      +'<div class="stat-label">N\u00e4sta \u00f6vernattning</div>'
      +'<div style="font-size:1.4rem;font-family:\'Playfair Display\',serif;color:var(--forest);margin:4px 0;">'+fmtDate(nextNight)+'</div>'
      +'<div class="text-sm text-muted">'+nextNightBookings.join(' &nbsp;&bull;&nbsp; ')+'</div>'
      +'</div>';
  } else {
    html += '<div class="card" style="margin-bottom:16px;"><p class="text-muted text-sm">Inga kommande \u00f6vernattningar bokade.</p></div>';
  }

  // Room matrix
  html += '<div class="sec-title" style="margin-bottom:10px;">Rumsmatris</div>';

function setBlockType(type){
  ['day','period','weekday'].forEach(function(t){
    var wrap=document.getElementById('block-'+t+'-wrap');
    var btn=document.getElementById('btype-'+t);
    if(wrap) wrap.style.display=type===t?'block':'none';
    if(btn){btn.className='btn btn-sm '+(type===t?'btn-primary':'btn-ghost');btn.style.flex='1';}
  });
}
function groupBlockedDates(dates){
  if(!dates||dates.length===0) return [];
  const sorted=[...dates].sort();
  const groups=[];
  let start=sorted[0], prev=sorted[0];
  for(let i=1;i<sorted.length;i++){
    const d=sorted[i];
    const prevDate=new Date(prev), curDate=new Date(d);
    const diffDays=(curDate-prevDate)/(1000*60*60*24);
    if(diffDays===1){prev=d;}
    else{groups.push(start===prev?{single:true,from:start}:{single:false,from:start,to:prev});start=d;prev=d;}
  }
  groups.push(start===prev?{single:true,from:start}:{single:false,from:start,to:prev});
  return groups;
}
function removeBlockedDate(d){
  DB.settings.blockedDates=DB.settings.blockedDates.filter(x=>x!==d);
  renderAdmin();toast('Datum frigjort');
}
function removeBlockedPeriod(from,to){
  let cur=new Date(from);const end=new Date(to);
  while(cur<=end){const d=cur.toISOString().slice(0,10);DB.settings.blockedDates=DB.settings.blockedDates.filter(x=>x!==d);cur.setDate(cur.getDate()+1);}
  renderAdmin();toast('Period frigjord');
}
function saveBlock(){
  const isWeekday=document.getElementById('block-weekday-wrap').style.display!=='none';
  const isPeriod=!isWeekday&&document.getElementById('block-period-wrap').style.display!=='none';
  const wdayNames=['öndag','måndag','tisdag','onsdag','torsdag','fredag','lördag'];
  if(isWeekday){
    const wday=parseInt(document.getElementById('bd-wday').value);
    const from=document.getElementById('bd-wfrom').value;
    const to=document.getElementById('bd-wto').value;
    if(!from||!to){toast('Ange både från och till','e');return;}
    let cur=new Date(from),end=new Date(to),added=0;
    while(cur<=end){
      if(cur.getDay()===wday){
        const d=cur.toISOString().slice(0,10);
        if(!DB.settings.blockedDates.includes(d)){DB.settings.blockedDates.push(d);added++;}
      }
      cur.setDate(cur.getDate()+1);
    }
    closeModal();renderAdmin();toast(added+' '+wdayNames[wday]+'ar blockerade');
  } else if(isPeriod){
    const from=document.getElementById('bd-from').value;
    const to=document.getElementById('bd-to').value;
    if(!from||!to){toast('Ange både från och till-datum','e');return;}
    if(from>to){toast('Från-datum måste vara före till-datum','e');return;}
    let cur=new Date(from),end=new Date(to),added=0;
    while(cur<=end){
      const d=cur.toISOString().slice(0,10);
      if(!DB.settings.blockedDates.includes(d)){DB.settings.blockedDates.push(d);added++;}
      cur.setDate(cur.getDate()+1);
    }
    closeModal();renderAdmin();toast(added+' datum blockerade');
  } else {
    const d=document.getElementById('bd-single').value;
    if(!d){toast('Välj ett datum','e');return;}
    if(!DB.settings.blockedDates.includes(d))DB.settings.blockedDates.push(d);
    closeModal();renderAdmin();toast('Datum blockerat');
  }
}

function toggleProg(id){
  const nv=DB.programs.find(p=>p.isNV);
  const idx=bookingState.programs.indexOf(id);
  if(idx>-1){bookingState.programs.splice(idx,1);}
  else{
    const nvSelected=bookingState.programs.filter(x=>x.startsWith('nv-'));
    const regSelected=bookingState.programs.filter(x=>!x.startsWith('nv-'));
    const isNVPkg=id.startsWith('nv-');
    const compatId=isNVPkg?id.replace('nv-',''):null;
    if(isNVPkg&&regSelected.includes(compatId)){toast('Avmarkera '+compatId+' som vanligt program först','e');return;}
    if(!isNVPkg&&nvSelected.includes('nv-'+id)){toast('Avmarkera NV-versionen först','e');return;}
    // Max NV-pkgs: days*2 half-slots minus 1 for the shared NV half = days*2-1
    // But practical: 1 day = max 1 NV-pkg, 2 days = max 3 NV-pkgs
    const maxNV=bookingState.days===1?1:(bookingState.days*2-1);
    if(isNVPkg&&nvSelected.length>=maxNV){toast('Max '+maxNV+' NV-inriktningar för '+bookingState.days+' dag(ar)','e');return;}
    bookingState.programs.push(id);
  }
  bStep2(document.getElementById('bk-body'));

// Helper: get date string for day after d
function nextDay(d){const dt=new Date(d);dt.setDate(dt.getDate()+1);return dt.toISOString().slice(0,10);}

// Build all possible slot options for a single day for given program ids (NV-packages + regular)
function slotTypeOrder(t){return t==='fm'?0:t==='hel'?1:2;} // FM < HEL < EM for sort

function slotsForDay(date, nvPkgIds, regProgIds){
  const nv=DB.programs.find(p=>p.isNV);
  const results=[];
  // NV packages
  if(nv) nvPkgIds.forEach(pkgId=>{
    const compatId=pkgId.replace('nv-','');
    if(!compatId) return;
    const compatProg=DB.programs.find(p=>p.id===compatId);
    if(!compatProg) return;
    const nvSlots=DB.slots.filter(s=>s.programId===nv.id&&s.date===date&&s.booked<s.capacity&&isDateBookable(s.date));
    nvSlots.forEach(nvS=>{
      const cType=nvS.type==='fm'?'em':'fm';
      const cs=DB.slots.find(s=>s.programId===compatId&&s.date===date&&(s.type===cType||s.type==='hel')&&s.booked<s.capacity);
      if(!cs) return;
      // FM/EM order handled below
      // Build accurate label: show which half is NV and which is compat
      const nvHalf = nvS.type==='fm' ? 'FM' : 'EM';
      const compatHalf = nvS.type==='fm' ? 'EM' : 'FM';
      const label = '🔬 NV-'+compatProg.name+': '+nvHalf+' NV + '+compatHalf+' '+compatProg.icon+' '+compatProg.name;
      // Always put FM slot first in array
      const orderedSlots = nvS.type==='fm' ? [nvS.id, cs.id] : [cs.id, nvS.id];
      results.push({pkgId,label,slots:orderedSlots,isNV:true,fullDay:true});
    });
  });
  // Regular programs: a single reg program must fill a FULL day (hel, or fm+em both available)
  // We return full-day options only — either a HEL slot, or a FM+EM pair from same program
  regProgIds.forEach(pid=>{
    const prog=DB.programs.find(p=>p.id===pid);
    if(!prog) return;
    const avail=DB.slots.filter(s=>s.programId===pid&&s.date===date&&s.booked<s.capacity&&isDateBookable(s.date));
    // Option 1: HEL slot
    const hel=avail.find(s=>s.type==='hel');
    if(hel){results.push({pkgId:pid,label:prog.icon+' '+prog.name+' (heldag)',slots:[hel.id],isNV:false,fullDay:true});return;}
    // Option 2: FM + EM pair
    const fm=avail.find(s=>s.type==='fm');
    const em=avail.find(s=>s.type==='em');
    if(fm&&em){results.push({pkgId:pid,label:prog.icon+' '+prog.name+': FM + EM',slots:[fm.id,em.id],isNV:false,fullDay:true});return;}
    // No full day available — skip (no loose halfdays)
  });
  return results;
}

function buildCombos(){
  try {
  const nv=DB.programs.find(p=>p.isNV);
  const nvPkgIds=bookingState.programs.filter(id=>id.startsWith('nv-')&&id.length>'nv-'.length);
  const regProgIds=bookingState.programs.filter(id=>!id.startsWith('nv-')&&DB.programs.find(p=>p.id===id));
  const days=bookingState.days;
  // Extract compat program IDs from NV packages
  const nvCompatIds=nvPkgIds.map(id=>id.replace('nv-',''));
  // All programs that need half-slots (reg progs + NV compat progs)
  const halfProgIds=[...new Set([...regProgIds,...nvCompatIds])];
  // Generate all candidate dates: from slots + next 90 days for open programs
  const slotDates=DB.slots.filter(s=>isDateBookable(s.date)).map(s=>s.date);
  const hasOpenProg=halfProgIds.some(pid=>{const p=DB.programs.find(x=>x.id===pid);return p&&p.slotMode==='open';});
  const extraDates=[];
  if(hasOpenProg){
    const today=new Date();today.setDate(today.getDate()+7);
    for(let i=0;i<90;i++){
      const d=new Date(today);d.setDate(today.getDate()+i);
      const ds=d.toISOString().slice(0,10);
      if(isDateBookable(ds)) extraDates.push(ds);
    }
  }
  const allDates=[...new Set([...slotDates,...extraDates])].sort();

  // Helper: check if a date is available for a program (respects slotMode)
  function isDateAvailForProg(date,pid){
    const prog=DB.programs.find(p=>p.id===pid);
    if(!prog) return false;
    if(!isDateBookable(date)) return false;
    const hasSlot=DB.slots.some(s=>s.programId===pid&&s.date===date);
    if(prog.slotMode==='open') return !hasSlot; // open: slot means CLOSED
    return hasSlot; // closed: slot means OPEN
  }

  // Helper: get actual slot for closed-mode program, or virtual slot for open-mode
  function getSlotsForProg(date,pid){
    const prog=DB.programs.find(p=>p.id===pid);
    if(!prog) return [];
    if(!isDateBookable(date)) return [];
    if(prog.slotMode==='open'){
      const hasSlot=DB.slots.some(s=>s.programId===pid&&s.date===date);
      if(hasSlot) return []; // closed day
      // Open program, no slot = available. Return virtual slots.
      return [{id:'virtual-'+pid+'-'+date+'-fm',programId:pid,date,type:'fm',capacity:prog.defaultCapacity,booked:0,virtual:true},
              {id:'virtual-'+pid+'-'+date+'-em',programId:pid,date,type:'em',capacity:prog.defaultCapacity,booked:0,virtual:true},
              {id:'virtual-'+pid+'-'+date+'-hel',programId:pid,date,type:'hel',capacity:prog.defaultCapacity,booked:0,virtual:true}];
    }
    return DB.slots.filter(s=>s.programId===pid&&s.date===date&&s.booked<s.capacity);
  }

  // Helper: find available half-slots for a program on a date (fm, em, or half of hel)
  function halfSlotsForProg(date,pid){
    const avail=getSlotsForProg(date,pid).filter(s=>s.booked<s.capacity||s.virtual);
    const results=[];
    avail.forEach(s=>{
      const prog=DB.programs.find(p=>p.id===pid);
      if(!prog) return;
      if(s.type==='fm'||s.type==='em') results.push({slotId:s.id,type:s.type,label:prog.icon+' '+prog.name+' '+s.type.toUpperCase(),spots:s.capacity-s.booked});
      if(s.type==='hel'){
        results.push({slotId:s.id,type:'fm',label:prog.icon+' '+prog.name+' FM',spots:s.capacity-s.booked});
        results.push({slotId:s.id,type:'em',label:prog.icon+' '+prog.name+' EM',spots:s.capacity-s.booked});
      }
      // Note: 'hel' type as full-day is handled by getFullDay() helper, not here
    });
    return results;
  }

  // Helper: find NV slot + paired compat slot on a date
  function nvPairForDate(date, compatId){
    if(!nv) return null;
    const nvSlots=DB.slots.filter(s=>s.programId===nv.id&&s.date===date&&s.booked<s.capacity&&isDateBookable(s.date));
    for(const nvS of nvSlots){
      const nvType=nvS.type; // fm or em
      const compatType=nvType==='fm'?'em':'fm';
      const compatAvail=getSlotsForProg(date,compatId);
      const cs=compatAvail.find(s=>s.type===compatType)||compatAvail.find(s=>s.type==='hel');
      if(cs){
        const cp=DB.programs.find(p=>p.id===compatId);
        const nvHalf=nvType.toUpperCase(), compatHalf=compatType.toUpperCase();
        const label='🔬 NV-'+cp.name+': '+nvHalf+' NV + '+compatHalf+' '+cp.icon+' '+cp.name;
        const csId=cs.virtual?'virtual-'+compatId+'-'+date+'-'+compatType:cs.id;
        const orderedSlots=nvType==='fm'?[nvS.id,csId]:[csId,nvS.id];
        const typeOverride={};
        if(cs.type==='hel') typeOverride[csId]=compatType;
        const compatSpots=cs.virtual?cs.capacity:(cs.capacity-cs.booked);
        return {nvSlotId:nvS.id,compatSlotId:csId,nvType,compatType,label,slots:orderedSlots,typeOverride,
                usedTypes:{fm:nvType==='fm'?nvS.id:csId, em:nvType==='em'?nvS.id:csId},
                spots:Math.min(nvS.capacity-nvS.booked, compatSpots)};
      }
    }
    return null;
  }

  // Build combos for 1 day
  if(days===1){
    const combos=[];
    // 1 day = 2 half-slots
    // If NV selected: 1 NV pair (uses both slots) + 0 extra half-progs
    // If no NV: fill with reg progs (need full day = hel or fm+em)
    if(nvPkgIds.length>0){
      // Try each NV-pkg as the paired one for this day
      allDates.forEach(date=>{
        nvPkgIds.forEach(nvPkgId=>{
          const compatId=nvPkgId.replace('nv-','');
          const pair=nvPairForDate(date,compatId);
          if(!pair) return;
          combos.push({date,date2:null,label:pair.label,slots:pair.slots,minSpots:pair.spots,isNV:true});
        });
      });
    } else if(regProgIds.length>=2){
      // 2+ regular programs on 1 day: each gets a half-slot (FM or EM)
      // A HEL slot can serve as either FM or EM
      allDates.forEach(date=>{
        const usedTypes=new Set();
        const picks=[];
        let ok=true;
        for(const pid of regProgIds.slice(0,2)){
          const prog=DB.programs.find(p=>p.id===pid);
          if(!prog){ok=false;break;}
          const avail=getSlotsForProg(date,pid);
          // Try FM first, then EM, then HEL (as either)
          let pick=null;
          for(const t of['fm','em']){
            if(usedTypes.has(t)) continue;
            const s=avail.find(s=>s.type===t);
            if(s){pick={slotId:s.id,type:t,label:prog.icon+' '+prog.name+' '+t.toUpperCase(),spots:s.capacity-s.booked};break;}
          }
          if(!pick){
            const hel=avail.find(s=>s.type==='hel');
            if(hel){
              const t=usedTypes.has('fm')?'em':'fm';
              pick={slotId:hel.id,type:t,label:prog.icon+' '+prog.name+' '+t.toUpperCase(),spots:hel.capacity-hel.booked};
            }
          }
          if(!pick){ok=false;break;}
          usedTypes.add(pick.type);
          picks.push(pick);
        }
        if(ok&&picks.length>=2){
          const label=picks.map(p=>p.label).join(' + ');
          const slots=picks.map(p=>p.slotId);
          const minSpots=Math.min(...picks.map(p=>p.spots));
          // typeOverride: maps slotId to actual type used (for HEL slots used as FM/EM)
          const typeOverride={};
          picks.forEach(p=>{typeOverride[p.slotId]=p.type;});
          combos.push({date,date2:null,label,slots,minSpots,isNV:false,typeOverride});
        }
      });
    } else {
      // 1 regular program: need a full day
      allDates.forEach(date=>{
        const prog=regProgIds.length>0?DB.programs.find(p=>p.id===regProgIds[0]):null;
        if(!prog) return;
        const pid=regProgIds[0];
        const avail=DB.slots.filter(s=>s.programId===pid&&s.date===date&&s.booked<s.capacity&&isDateBookable(s.date));
        const hel=avail.find(s=>s.type==='hel');
        if(hel){combos.push({date,date2:null,label:prog.icon+' '+prog.name+' (heldag)',slots:[hel.id],minSpots:hel.capacity-hel.booked,isNV:false});return;}
        const fm=avail.find(s=>s.type==='fm'),em=avail.find(s=>s.type==='em');
        if(fm&&em)combos.push({date,date2:null,label:prog.icon+' '+prog.name+': FM + EM',slots:[fm.id,em.id],minSpots:Math.min(fm.capacity-fm.booked,em.capacity-em.booked),isNV:false});
      });
    }
    return combos;
  }

  // Build combos for 2 days
  // Structure: 4 half-slots total
  // If NV selected: 1 NV pair on one day + remaining compat progs fill the other day's half-slots
  // If no NV: each day filled with reg progs (hel or fm+em)
  const combos=[];
  for(let i=0;i<allDates.length-1;i++){
    const d1=allDates[i],d2=allDates[i+1];
    if(nextDay(d1)!==d2) continue;
    if(bookingState.overnight){
      if(!availableRoomsOnNight(prevDay(d1)).length) continue;
      if(!availableRoomsOnNight(d1).length) continue;
    }

    if(nvPkgIds.length>0){
      // Try each NV-pkg as the one paired with NV
      for(const nvPkgId of nvPkgIds){
        const pairedCompatId=nvPkgId.replace('nv-','');
        // Remaining compat progs (unpaired) need half-slots
        const remainingCompatIds=nvCompatIds.filter(id=>id!==pairedCompatId);
        const allHalfProgs=[...remainingCompatIds,...regProgIds]; // need half-slots on day2

        // Try NV pair on day1, remaining on day2
        for(const nvDay of [d1,d2]){
          const otherDay=nvDay===d1?d2:d1;
          const pair=nvPairForDate(nvDay,pairedCompatId);
          if(!pair) continue;

          // Schedule remaining half progs on otherDay
          // otherDay has 2 half-slots (fm + em)
          if(allHalfProgs.length>2) continue; // can't fit more than 2 half-slots
          
          const usedOnOtherDay=new Set();
          const otherPicks=[];
          let ok=true;
          for(const pid of allHalfProgs){
            const halfSlots=halfSlotsForProg(otherDay,pid).filter(h=>!usedOnOtherDay.has(h.type));
            // Prefer fm then em
            const pick=halfSlots.find(h=>h.type==='fm')||halfSlots.find(h=>h.type==='em');
            if(!pick){ok=false;break;}
            usedOnOtherDay.add(pick.type);
            otherPicks.push(pick);
          }
          if(!ok) continue;

          const day1Picks=nvDay===d1?[pair]:otherPicks;
          const day2Picks=nvDay===d2?[pair]:otherPicks;
          const allSlotIds=[...pair.slots,...otherPicks.map(p=>p.slotId)].filter(Boolean);
          const allSpots=[pair.spots,...otherPicks.map(p=>p.spots)].filter(n=>n>0);
          const minSpots=allSpots.length?Math.min(...allSpots):0;
          const otherLabel=otherPicks.length>0?otherPicks.map(p=>p.label).join(' + '):'(fri halvdag)';
          const label1=nvDay===d1?pair.label:otherLabel;
          const label2=nvDay===d2?pair.label:otherLabel;
          combos.push({date:d1,date2:d2,label:label1,label2,slots:allSlotIds,minSpots,isNV:true});
        }
      }
    } else {
      // No NV: each reg prog gets a full day or the two days share half-slots
      if(regProgIds.length===1){
        // Same prog both days
        const pid=regProgIds[0],prog=DB.programs.find(p=>p.id===pid);
        if(!prog) continue;
        const getFullDay=(date)=>{
          const avail=DB.slots.filter(s=>s.programId===pid&&s.date===date&&s.booked<s.capacity&&isDateBookable(s.date));
          const hel=avail.find(s=>s.type==='hel');
          if(hel) return {slots:[hel.id],label:prog.icon+' '+prog.name+' (heldag)',spots:hel.capacity-hel.booked};
          const fm=avail.find(s=>s.type==='fm'),em=avail.find(s=>s.type==='em');
          if(fm&&em) return {slots:[fm.id,em.id],label:prog.icon+' '+prog.name+': FM + EM',spots:Math.min(fm.capacity-fm.booked,em.capacity-em.booked)};
          return null;
        };
        const day1=getFullDay(d1),day2=getFullDay(d2);
        if(day1&&day2){
          const allSlotIds=[...day1.slots,...day2.slots];
          const minSpots=Math.min(day1.spots,day2.spots);
          combos.push({date:d1,date2:d2,label:day1.label,label2:day2.label,slots:allSlotIds,minSpots,isNV:false});
        }
      } else if(regProgIds.length>=2){
        // Different progs on different days — try all splits
        for(const [p1id,p2id] of [[regProgIds[0],regProgIds[1]],[regProgIds[1],regProgIds[0]]]){
          const p1=DB.programs.find(p=>p.id===p1id),p2=DB.programs.find(p=>p.id===p2id);
          if(!p1||!p2) continue;
          const getFullDay=(date,pid,prog)=>{
            const avail=DB.slots.filter(s=>s.programId===pid&&s.date===date&&s.booked<s.capacity&&isDateBookable(s.date));
            const hel=avail.find(s=>s.type==='hel');
            if(hel) return {slots:[hel.id],label:prog.icon+' '+prog.name+' (heldag)',spots:hel.capacity-hel.booked};
            const fm=avail.find(s=>s.type==='fm'),em=avail.find(s=>s.type==='em');
            if(fm&&em) return {slots:[fm.id,em.id],label:prog.icon+' '+prog.name+': FM + EM',spots:Math.min(fm.capacity-fm.booked,em.capacity-em.booked)};
            return null;
          };
          const day1=getFullDay(d1,p1id,p1),day2=getFullDay(d2,p2id,p2);
          if(day1&&day2){
            const allSlotIds=[...day1.slots,...day2.slots];
            combos.push({date:d1,date2:d2,label:day1.label,label2:day2.label,slots:allSlotIds,minSpots:Math.min(day1.spots,day2.spots),isNV:false});
          }
        }
      }
    }
  }
  // Deduplicate
  const seen=new Set();
  return combos.filter(c=>{const k=c.slots.slice().sort().join();if(seen.has(k))return false;seen.add(k);return true;});
  } catch(err) {
    console.error('buildCombos error:', err.message, err.stack);
    return [];
  }
}

function buildConfirmationEmail(booking){
  // Collect all slot details
  const slotDetails = booking.slots.map(sid=>{
    const sl=DB.slots.find(s=>s.id===sid);
    const prog=sl?DB.programs.find(p=>p.id===sl.programId):null;
    return sl&&prog?{date:sl.date,type:sl.type,prog:prog.name,icon:prog.icon,emailText:prog.emailText}:null;
  }).filter(Boolean);
  // Group by date, sort FM before EM
  const byDate={};
  slotDetails.forEach(s=>{
    if(!byDate[s.date]) byDate[s.date]=[];
    byDate[s.date].push(s);
  });
  Object.values(byDate).forEach(arr=>arr.sort((a,b)=>a.type==='fm'?-1:1));
  const scheduleLines=Object.entries(byDate).sort((a,b)=>a[0].localeCompare(b[0])).map(([date,slots])=>{
    const dayLabel=slots.map(s=>s.icon+' '+(s.type==='hel'?s.prog+' (heldag)':s.prog+' ('+(s.type==='fm'?'förmiddag':'eftermiddag')+')')).join(' + ');
    return fmtDate(date)+': '+dayLabel;
  }).join('\n');
  // Program-specific texts
  const progTexts=[...new Set(slotDetails.map(s=>s.prog))].map(name=>{
    const prog=DB.programs.find(p=>p.name===name);
    return prog&&prog.emailText?'--- '+prog.name+' ---\n'+prog.emailText:'';
  }).filter(Boolean).join('\n\n');
  return {scheduleLines,progTexts};
}

function computeBCC(booking){
  const bcc=[];
  // Admin always
  (DB.settings.adminEmails||[]).forEach(function(em){bcc.push({label:'Admin',email:em});});
  // Staff for each booked program
  const bookedProgIds=[...new Set(booking.slots.map(sid=>{
    const sl=DB.slots.find(s=>s.id===sid); return sl?sl.programId:null;
  }).filter(Boolean))];
  bookedProgIds.forEach(pid=>{
    DB.users.filter(u=>u.role==='personal'&&u.program===pid&&u.email).forEach(u=>{
      bcc.push({label:u.name+' ('+DB.programs.find(p=>p.id===pid)?.name+')',email:u.email});
    });
  });
  // Internat if overnight
  if(booking.overnight&&DB.settings.internatEmail){
    bcc.push({label:'Internatpersonal',email:DB.settings.internatEmail});
    // Also internat users
    DB.users.filter(u=>u.role==='internat'&&u.email).forEach(u=>bcc.push({label:u.name+' (internat)',email:u.email}));
  }
  // Kitchen if special food
  if(booking.specialFood&&DB.settings.kitchenEmail){
    bcc.push({label:'Köket (specialkost: '+booking.specialFood+')',email:DB.settings.kitchenEmail});
  }
  return bcc;
}

async function confirmBooking(){
  const allSlotIds=bookingState.slots.flatMap(c=>c.slots);
  // Build typeOverride map from all combos
  const typeOverrideMap={};
  bookingState.slots.forEach(combo=>{
    if(combo.typeOverride) Object.assign(typeOverrideMap,combo.typeOverride);
  });
  // Separate virtual and real slot IDs
  const virtualSlots=allSlotIds.filter(id=>id.startsWith('virtual-'));
  // Real slots that need to be split (HEL used as FM/EM)
  const helSplitSlots=allSlotIds.filter(id=>!id.startsWith('virtual-')&&typeOverrideMap[id]&&DB.slots.find(s=>s.id===id&&s.type==='hel'));
  const realSlotIds=allSlotIds.filter(id=>!id.startsWith('virtual-')&&!helSplitSlots.includes(id));
  const createdSlotIds=[...realSlotIds];
  // Handle HEL slots used as FM/EM: create FM+EM slots, book only the needed half
  for(const sid of helSplitSlots){
    const origSlot=DB.slots.find(s=>s.id===sid);
    if(!origSlot) continue;
    const usedType=typeOverrideMap[sid];
    const pid=origSlot.programId;
    const date=origSlot.date;
    const prog=DB.programs.find(p=>p.id===pid);
    const cap=origSlot.capacity;
    const fmResp=await fetch('/api/slots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slots:[{programId:pid,date,type:'fm',capacity:cap}]})});
    const fmData=await fmResp.json();
    const emResp=await fetch('/api/slots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slots:[{programId:pid,date,type:'em',capacity:cap}]})});
    const emData=await emResp.json();
    await fetch('/api/slots?id='+sid,{method:'DELETE'});
    DB.slots=DB.slots.filter(s=>s.id!==sid);
    if(fmData.slots&&fmData.slots[0]){
      const ns=fmData.slots[0];
      DB.slots.push({id:ns.id,programId:ns.program_id,date:ns.date,type:'fm',capacity:ns.capacity,booked:0});
      if(usedType==='fm') createdSlotIds.push(ns.id);
    }
    if(emData.slots&&emData.slots[0]){
      const ns=emData.slots[0];
      DB.slots.push({id:ns.id,programId:ns.program_id,date:ns.date,type:'em',capacity:ns.capacity,booked:0});
      if(usedType==='em') createdSlotIds.push(ns.id);
    }
  }
  for(const vid of virtualSlots){
    // Format: virtual-{pid}-{YYYY-MM-DD}-{type}
    const withoutPrefix=vid.slice('virtual-'.length); // e.g. djurvard-2026-04-22-em
    const typeMatch=withoutPrefix.match(/-(fm|em|hel)$/);
    const type=typeMatch?typeMatch[1]:'hel';
    const withoutType=withoutPrefix.slice(0,withoutPrefix.lastIndexOf('-'+type));
    const dateMatch=withoutType.match(/(\d{4}-\d{2}-\d{2})$/);
    const date=dateMatch?dateMatch[1]:'';
    const pid=withoutType.slice(0,withoutType.lastIndexOf('-'+date));
    const prog=DB.programs.find(p=>p.id===pid);
    const resp=await fetch('/api/slots',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slots:[{programId:pid,date,type,capacity:prog?prog.defaultCapacity:10}]})});
    const data=await resp.json();
    if(data.slots&&data.slots[0]){
      const ns=data.slots[0];
      DB.slots.push({id:ns.id,programId:ns.program_id,date:ns.date,type:ns.type,capacity:ns.capacity,booked:ns.booked});
      createdSlotIds.push(ns.id);
    }
  }
  // Get slot dates for overnight
  const allSlotDates=[...new Set(createdSlotIds.map(sid=>{const s=DB.slots.find(x=>x.id===sid);return s?s.date:null;}).filter(Boolean))].sort();
  const day1b=allSlotDates[0];
  const nights=bookingState.overnight?(allSlotDates.length===1?[prevDay(day1b)]:[prevDay(day1b),day1b]):[];
  // Save booking via API
  const resp=await fetch('/api/bookings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    studentName:bookingState.studentName,studentEmail:bookingState.studentEmail,
    guardianEmail:bookingState.guardianEmail,phone:bookingState.phone,
    school:bookingState.school,municipality:bookingState.municipality,
    grade:bookingState.grade,days:bookingState.days,overnight:bookingState.overnight,
    specialFood:bookingState.specialFood,otherInfo:bookingState.otherInfo,
    slotIds:createdSlotIds,slotDates:allSlotDates,nights
  })});
  const data=await resp.json();
  if(data.error){toast(data.error,'e');return;}
  // Update local DB
  createdSlotIds.forEach(sid=>{const s=DB.slots.find(x=>x.id===sid);if(s)s.booked=Math.min(s.booked+1,s.capacity);});
  DB.bookings.push({id:data.id,studentName:bookingState.studentName,studentEmail:bookingState.studentEmail,guardianEmail:bookingState.guardianEmail,phone:bookingState.phone,school:bookingState.school,municipality:bookingState.municipality,grade:bookingState.grade,days:bookingState.days,overnight:bookingState.overnight,slots:createdSlotIds,specialFood:bookingState.specialFood,otherInfo:bookingState.otherInfo,code:data.code,createdAt:new Date().toISOString().slice(0,10)});
  bookingState.code=data.code;bookingState.bookingId=data.id;
  const newBooking=DB.bookings[DB.bookings.length-1];
  setTimeout(()=>simulateSendEmail(newBooking),400);
  bookingState.step=6;renderBStep();
}

function bSuccess(b){
  b.innerHTML=`<div class="success-wrap">
    <div class="sicon">🎉</div>
    <h2>Bokning bekräftad!</h2>
    <p>Välkommen, ${bookingState.studentName}! Bekräftelse har skickats till ${bookingState.studentEmail} och ${bookingState.guardianEmail}.</p>
    <div class="bk-ref"><p>Din bokningskod</p><strong>${bookingState.code}</strong></div>
    <div class="info-box" style="text-align:left;margin-bottom:16px;">
      <strong>📧 Ditt bekräftelsemejl innehåller:</strong><br>
      • Bokningskod och alla detaljer<br>
      • Avbokningslänk (alltid giltig)<br>
      • Påminnelse skickas ett par dagar innan<br><br>
      <em style="font-size:.82rem;">${DB.settings.adminEmailText.split('\n')[0]}</em>
    </div>
    <button class="btn btn-primary btn-full" onclick="showLogin()">← Tillbaka till startsidan</button>
  </div>`;
}

// UTILS
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return`${parseInt(day)} ${['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'][parseInt(m)-1]} ${y}`;}
function fmtDateLong(d){if(!d)return'';const days=['söndagen','måndagen','tisdagen','onsdagen','torsdagen','fredagen','lördagen'];const dt=new Date(d);const dayName=days[dt.getDay()];const[y,m,day]=d.split('-');return`${dayName} ${parseInt(day)} ${['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'][parseInt(m)-1]} ${y}`;}
function prevDay(d){const dt=new Date(d);dt.setDate(dt.getDate()-1);return dt.toISOString().slice(0,10);}
function showModal(html){const el=document.createElement('div');el.className='modal-overlay';el.id='modal-ov';el.innerHTML=`<div class="modal">${html}</div>`;el.addEventListener('click',e=>{if(e.target===el)closeModal();});document.getElementById('modal-ct').appendChild(el);}
function closeModal(){const el=document.getElementById('modal-ov');if(el)el.remove();}
let _tt;
function toast(msg,type='s'){let t=document.getElementById('_toast');if(!t){t=document.createElement('div');t.id='_toast';document.body.appendChild(t);}t.textContent=msg;t.style.cssText=`position:fixed;bottom:68px;left:50%;transform:translateX(-50%);background:${type==='e'?'#dc2626':'#2d5a3d'};color:#fff;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:700;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap;max-width:90vw;text-align:center;`;clearTimeout(_tt);_tt=setTimeout(()=>t.remove(),2800);}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('screen-login').style.display!=='none')doLogin();});
// Load data from API then start
async function initDB(){
  try {
    const [progs, staffRes, slotsRes, bookingsRes, settingsRes] = await Promise.all([
      fetch('/api/programs').then(r=>r.json()),
      fetch('/api/staff').then(r=>r.json()),
      fetch('/api/slots').then(r=>r.json()),
      fetch('/api/bookings').then(r=>r.json()),
      fetch('/api/settings').then(r=>r.json()),
    ]);
    if(Array.isArray(progs)) DB.programs=progs.map(p=>({id:p.id,name:p.name,icon:p.icon||'🎓',isNV:p.is_nv,hidden:p.hidden,slotMode:p.slot_mode,defaultCapacity:p.default_capacity,emailText:p.email_text||'',nvCompatible:p.nv_compatible||[],description:p.description||''}));
    if(Array.isArray(staffRes)) DB.users=staffRes.map(u=>({id:u.id,name:u.name,role:u.role,program:u.program_id,email:u.email,pass:''}));
    if(Array.isArray(slotsRes)) DB.slots=slotsRes.map(s=>({id:s.id,programId:s.program_id,date:s.date,type:s.type,capacity:s.capacity,booked:s.booked}));
    if(Array.isArray(bookingsRes)) DB.bookings=bookingsRes.map(b=>({id:b.id,studentName:b.student_name,studentEmail:b.student_email,guardianEmail:b.guardian_email,phone:b.phone,school:b.school,municipality:b.municipality,grade:b.grade,days:b.days,overnight:b.overnight,slots:(b.booking_slots||[]).map(bs=>bs.slot_id),specialFood:b.special_food||'',otherInfo:b.other_info||'',code:b.code,createdAt:b.created_at}));
    if(settingsRes && !settingsRes.error) DB.settings=Object.assign(DB.settings,{schoolName:settingsRes.school_name,senderEmail:settingsRes.sender_email,adminEmails:settingsRes.admin_emails||[],kitchenEmail:settingsRes.kitchen_email,internatEmail:settingsRes.internat_email,internatEmailText:settingsRes.internat_email_text,adminEmailText:settingsRes.admin_email_text,overnightCapacity:settingsRes.overnight_capacity||3,smtpHost:settingsRes.smtp_host,smtpPort:settingsRes.smtp_port,smtpUser:settingsRes.smtp_user,smtpPass:settingsRes.smtp_pass,openTerms:settingsRes.open_terms||[],blockedDates:(settingsRes.blocked_dates||[]).map(d=>d.slice(0,10))});
  } catch(e) { console.error('initDB error:', e); }
}
// Start on booking flow
initDB().then(()=>showBooking());
